services:
  # Backend API
  - type: web
    name: gtms-api
    runtime: docker
    dockerfilePath: packages/backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gtms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://gtms-web.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: ANTHROPIC_API_KEY
        value: sk-placeholder
      - key: RESEND_API_KEY
        value: ""
      - key: MS_CLIENT_ID
        value: ""
      - key: MS_TENANT_ID
        value: ""
      - key: MS_CLIENT_SECRET
        value: ""
    healthCheckPath: /health

  # Frontend
  - type: web
    name: gtms-web
    runtime: docker
    dockerfilePath: packages/frontend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://gtms-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_MS_CLIENT_ID
        value: ""
      - key: NEXT_PUBLIC_MS_TENANT_ID
        value: ""

databases:
  - name: gtms-db
    plan: free
    databaseName: gtms
    user: gtms

# Scheduled jobs run in-process via node-cron (no Redis needed).
