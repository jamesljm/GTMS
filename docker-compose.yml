services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gtms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    env_file:
      - packages/backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gtms
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: https://gtms.geohan.com
      NODE_ENV: production
    ports:
      - "3005:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api-gtms.geohan.com/api/v1
        NEXT_PUBLIC_MS_CLIENT_ID: ${NEXT_PUBLIC_MS_CLIENT_ID:-}
        NEXT_PUBLIC_MS_TENANT_ID: ${NEXT_PUBLIC_MS_TENANT_ID:-}
    ports:
      - "3002:3000"
    depends_on:
      - backend

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: postgres
      TZ: Asia/Kuala_Lumpur
    volumes:
      - ./scripts/docker-backup.sh:/backup.sh:ro
      - "C:/Users/Harmen/Documents/TempHost/GTMS-Backups:/backups"
    entrypoint: ["sh", "/backup.sh"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
